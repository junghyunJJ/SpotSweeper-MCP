version: '3.8'

services:
  spotseeker:
    build: .
    ports:
      - "8080:8080"  # R API port
      - "8000:8000"  # MCP port
    volumes:
      - ./data:/app/data
      - ./results:/app/results
    environment:
      - R_MAX_MEM_SIZE=4g
      - R_MAX_VSIZE=8g
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    
  # Optional: nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - spotseeker
    restart: unless-stopped